name: Daily Job Board Update

# Ingests new Bluesky posts into Supabase and regenerates the static
# frontend snapshot (positions.json + SEO pages). Runs 4x/day for fresher
# website data — Telegram posting was extracted to its own workflow
# (telegram-digest.yml) which still runs 3x/day so channel cadence is
# unchanged.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"   # 07:00 UTC
    - cron: "0 11 * * *"  # 13:00 UTC
    - cron: "0 17 * * *"  # 19:00 UTC
    - cron: "0 23 * * *"  # 01:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Stage 1 - Fetch posts
        run: python bluesky_search.py --storage supabase --sources bluesky --stage fetch
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Stage 2 - Filter (LLM classification)
        run: python bluesky_search.py --storage supabase --sources bluesky --stage filter
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Stage 3 - Deduplicate
        run: python bluesky_search.py --storage supabase --sources bluesky --stage dedup
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Stage 4 - Publish
        run: python bluesky_search.py --storage supabase --sources bluesky --stage publish
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Generate SEO pages
        run: python scripts/generate_seo_pages.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push SEO updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update SEO content (daily)"
          git pull --rebase
          git push
