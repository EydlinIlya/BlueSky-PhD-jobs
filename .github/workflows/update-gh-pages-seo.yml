name: Update gh-pages SEO

# Refreshes the SEO content on the gh-pages branch (which serves the legacy
# GitHub Pages site at eydlinilya.github.io/BlueSky-PhD-jobs/). The branch's
# app.js queries Supabase live so user-facing data is always fresh — but
# this keeps positions.html, the embedded instant-paint JSON, and the
# noscript fallback up to date for crawlers and no-JS visitors.
#
# Runs against the gh-pages copy of generate_seo_pages.py (the OLD logic
# without positions.json), so this is independent of any future changes
# on main.

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * *"   # 08:30 UTC
    - cron: "30 12 * * *"  # 14:30 UTC
    - cron: "30 18 * * *"  # 20:30 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Generate SEO pages
        run: python scripts/generate_seo_pages.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push SEO updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update gh-pages SEO content (daily)"
          git pull --rebase
          git push
